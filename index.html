</script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, 'Microsoft JhengHei', 'Segoe UI', sans-serif; background: #f5f7fa; color: #333; padding: 20px; }
.container { max-width: 1400px; margin: 0 auto; }
h1 { font-size: 24px; margin-bottom: 4px; display: flex; align-items: center; gap: 12px; }
h1 small { font-size: 14px; font-weight: normal; color: #888; }
.subtitle { color: #666; font-size: 13px; margin-bottom: 20px; }
.chart-container { background: #fff; border-radius: 12px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); margin-bottom: 16px; }
.chart-wrapper { position: relative; height: 400px; }
.legend-hint { text-align: center; font-size: 12px; color: #aaa; margin-top: 8px; }
.detail-panel { background: #fff; border-radius: 12px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); display: none; }
.detail-panel.visible { display: block; }
.detail-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 16px; flex-wrap: wrap; gap: 8px; }
.detail-title { font-size: 18px; font-weight: bold; }
.detail-title .person-badge { display: inline-block; padding: 2px 10px; border-radius: 4px; font-size: 14px; color: #fff; margin-left: 8px; }
.detail-title .person-badge.qian { background: #D35400; }
.detail-title .person-badge.xuan { background: #2980B9; }
.detail-title .person-badge.jun { background: #27AE60; }
.detail-stats { display: flex; gap: 16px; font-size: 13px; color: #666; }
.detail-stats span { background: #f0f2f5; padding: 4px 10px; border-radius: 6px; }
.detail-stats .stat-val { font-weight: bold; color: #333; }
.task-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.task-table th { background: #f8f9fa; padding: 8px 10px; text-align: left; font-weight: 600; border-bottom: 2px solid #dee2e6; position: sticky; top: 0; }
.task-table td { padding: 8px 10px; border-bottom: 1px solid #eee; vertical-align: top; }
.task-table tr:hover td { background: #f8f9ff; }
.task-table .score-cell { white-space: nowrap; text-align: center; font-size: 12px; }
.task-table .score-cell .dim { display: inline-block; min-width: 14px; }
.task-table .score-cell .L { color: #e74c3c; }
.task-table .score-cell .M { color: #f39c12; }
.task-table .score-cell .H { color: #27ae60; }
.task-table .pts-cell { text-align: center; font-weight: bold; font-size: 12px; }
.task-table .desc-cell { max-width: 400px; }
.task-table .subtask { padding-left: 28px !important; }
.task-table .subtask .sub-indicator { color: #aaa; margin-right: 4px; font-size: 11px; }
.section-header td { background: #eef2f7; font-weight: 600; font-size: 12px; color: #555; padding: 6px 10px; }
.no-data { text-align: center; padding: 40px; color: #aaa; font-size: 14px; }
.close-btn { background: none; border: 1px solid #ddd; border-radius: 6px; padding: 4px 12px; cursor: pointer; font-size: 13px; color: #888; }
.close-btn:hover { background: #f0f0f0; }
.week-nav { display: flex; gap: 4px; flex-wrap: wrap; margin: 12px 0; }
.week-btn { padding: 3px 10px; border: 1px solid #ddd; border-radius: 4px; background: #fff; cursor: pointer; font-size: 11px; color: #555; }
.week-btn:hover { background: #f0f0f0; }
.week-btn.active { background: #333; color: #fff; border-color: #333; }
.week-btn.warn { border-color: #e74c3c; color: #e74c3c; }
.switch-group { margin: 8px 0; display: flex; gap: 8px; align-items: center; }
.switch-btn { padding: 4px 14px; border: 1px solid #ccc; border-radius: 6px; background: #fff; cursor: pointer; font-size: 12px; color: #555; }
.switch-btn.active { background: #333; color: #fff; border-color: #333; }
.info-text { font-size: 11px; color: #999; margin-top: 8px; }
.report-box { background: #f8f9fb; border-radius: 8px; padding: 14px 16px; margin: 16px 0; font-size: 13px; line-height: 1.7; border-left: 4px solid #4a90d9; }
.report-box .report-title { font-weight: bold; font-size: 14px; margin-bottom: 8px; color: #333; }
.report-box .report-item { margin: 3px 0; }
.report-box .report-item .label { color: #888; }
.report-box .report-item .up { color: #27ae60; }
.report-box .report-item .down { color: #e74c3c; }
.report-box .report-item .flat { color: #f39c12; }
.report-box .dim-chart { display: flex; gap: 16px; margin: 8px 0; flex-wrap: wrap; }
.report-box .dim-chart .dim-item { display: flex; align-items: center; gap: 6px; }
.report-box .dim-chart .dim-bar { width: 80px; height: 8px; background: #eee; border-radius: 4px; overflow: hidden; }
.report-box .dim-chart .dim-bar-fill { height: 100%; border-radius: 4px; }
.strat-badge { display:inline-block; font-size:10px; padding:1px 6px; border-radius:3px; white-space:nowrap; line-height:1.6; }
.toggle-view-btn { font-size:11px; padding:3px 10px; border:1px solid #4a90d9; background:#fff; color:#4a90d9; border-radius:4px; cursor:pointer; white-space:nowrap; }
.toggle-view-btn:hover { background:#4a90d9; color:#fff; }
.toggle-view-btn.active { background:#4a90d9; color:#fff; }
.strat-dist { display:flex; flex-wrap:wrap; gap:8px; margin:6px 0; }
.strat-dist-item { display:flex; align-items:center; gap:6px; font-size:12px; }
.strat-dist-bar { width:60px; height:7px; border-radius:3px; overflow:hidden; background:#eee; }
.strat-dist-fill { height:100%; border-radius:3px; }
.viz-section { background:#fff; border-radius:12px; padding:20px; box-shadow:0 2px 8px rgba(0,0,0,0.06); margin-bottom:16px; }
.viz-section h3 { font-size:16px; margin-bottom:12px; color:#333; display:flex; align-items:center; gap:8px; }
.viz-section h3 small { font-size:12px; color:#999; font-weight:normal; }
.dim-dist-table { width:100%; border-collapse:collapse; font-size:13px; }
.dim-dist-table th { padding:4px 8px; border-bottom:2px solid #dee2e6; text-align:center; white-space:nowrap; }
.dim-dist-table th:first-child { text-align:left; }
.dim-dist-table td { padding:5px 8px; text-align:center; }
.dim-dist-table .person-name { font-weight:bold; text-align:left; white-space:nowrap; }
.dim-dist-bar { display:flex; height:16px; border-radius:3px; overflow:hidden; min-width:80px; }
.dim-dist-bar .seg { min-width:2px; transition:width 0.2s; }
.dim-dist-bar .seg:hover { opacity:0.8; }
.dim-dist-total { font-size:10px; color:#888; margin-top:2px; }
.strat-trend-wrapper { position:relative; height:300px; }
.evo-labels { display:flex; gap:10px; flex-wrap:wrap; margin:6px 0; }
.evo-badge { display:inline-flex; align-items:center; gap:4px; font-size:11px; padding:3px 8px; border-radius:4px; }
.evo-badge.breadth { background:#e8f5e9; color:#2e7d32; }
.evo-badge.depth { background:#e3f2fd; color:#1565c0; }
.evo-badge.shift { background:#fff3e0; color:#e65100; }
.evo-badge.shift-up { background:#fce4ec; color:#c62828; }
.comfort-badge { display:inline-block; font-size:9px; padding:1px 5px; border-radius:3px; margin-left:4px; }
.comfort-badge.zone { background:#f3e5f5; color:#7b1fa2; }
.comfort-badge.novel { background:#fff8e1; color:#f57f17; }
.collapse-btn { background:none; border:1px solid #ccc; border-radius:4px; padding:2px 10px; cursor:pointer; font-size:12px; color:#888; margin-left:8px; }
.collapse-btn:hover { background:#f0f0f0; }
.collapse-btn.collapsed::after { content:' ▸'; }
.collapse-btn:not(.collapsed)::after { content:' ▾'; }
.collapsible-body { overflow:hidden; transition:max-height 0.3s ease; max-height:2000px; }
.collapsible-body.hidden { max-height:0; padding-top:0 !important; padding-bottom:0 !important; margin-top:0 !important; margin-bottom:0 !important; }
.radial-container { position:relative; height:500px; }
#radialChart { width:100%; height:100%; }
.radial-legend { display:flex; gap:10px; flex-wrap:wrap; margin:8px 0; font-size:12px; }

function renderStrategyOverview(person) {
  var counts = {}, weeksSet = {}, allTasks = [];
  for (var wk in DETAIL_DATA[person]) {
    DETAIL_DATA[person][wk].tasks.forEach(function(t) {
      if (t.is_subtask) return;
      var s = t.strategy || '';
      if (!counts[s]) { counts[s] = 0; weeksSet[s] = {}; }
      counts[s]++;
      weeksSet[s][wk] = true;
      allTasks.push({week: wk, task: t});
    });
  }
  var keys = Object.keys(counts).sort(function(a,b) {
    return (STRATEGY_META[a] ? 0 : 1) - (STRATEGY_META[b] ? 0 : 1) || counts[b] - counts[a];
  });
  var total = keys.reduce(function(a,k){return a+counts[k];}, 0);
  var html = '<div class="report-box" style="margin-top:0;">';
  html += '<div style="font-weight:bold;font-size:14px;margin-bottom:10px;">' + DISPLAY_NAMES[person] + ' 年度策略關聯總覽</div>';
  html += '<div style="font-size:12px;color:#888;margin-bottom:8px;">共 ' + total + ' 件任務關聯年度策略</div>';
  keys.forEach(function(k) {
    var m = STRATEGY_META[k] || STRATEGY_DEFAULT;
    var pct = counts[k] / total * 100;
    var wkCount = Object.keys(weeksSet[k]).length;
    html += '<div style="display:flex;align-items:center;gap:8px;margin:4px 0;font-size:12px;">' +
      '<span class="strat-badge" style="background:' + m.bg + ';color:' + m.color + ';border:1px solid ' + m.color + ';width:56px;text-align:center;">' + m.label + '</span>' +
      '<div style="flex:1;height:10px;background:#eee;border-radius:4px;overflow:hidden;">' +
      '<div style="height:100%;width:' + pct + '%;background:' + m.color + ';border-radius:4px;"></div></div>' +
      '<span style="color:#888;min-width:80px;text-align:right;">' + counts[k] + '件 / ' + wkCount + '週</span></div>';
  });
  html += '</div>';
  document.getElementById('detailSummary').innerHTML = html;
  // List tasks grouped by strategy
  html = '<div class="report-box" style="margin-top:8px;">';
  html += '<div style="font-weight:bold;font-size:13px;margin-bottom:8px;">各策略任務清單</div>';
  keys.forEach(function(k) {
    var m = STRATEGY_META[k] || STRATEGY_DEFAULT;
    var tasks = allTasks.filter(function(x) { return (x.task.strategy || '') === k; });
    if (tasks.length === 0) return;
    html += '<div style="margin:6px 0 4px;font-size:12px;font-weight:bold;color:' + m.color + ';">' + m.label + '（' + tasks.length + '件）</div>';
    tasks.sort(function(a,b){return parseInt(a.week)-parseInt(b.week);});
    tasks.forEach(function(x) {
      html += '<div style="font-size:11px;color:#666;padding-left:14px;margin:1px 0;">W' + x.week + ' · ' + htmlEscape(x.task.desc.length > 45 ? x.task.desc.substring(0,45) + '\u2026' : x.task.desc) + '</div>';
    });
  });
  html += '</div>';
  document.getElementById('taskTableContainer').innerHTML = html;
}

      (t.score_map['影'] ? t.score_map['影'].label : '') + ' ' +

    const desc = t.desc.length > 60 ? t.desc.substring(0, 60) + '…' : t.desc;

      else if (pts2 > avgPts2*1.25 && tasks2 > avgTasks2*1.15) stL = '豐盛';

function getPersonDimAvg(person) {
  var dims = ['時','技','影','複'];
  var totals = {時:0,技:0,影:0,複:0};
  var counts = {時:0,技:0,影:0,複:0};
  var pd = DETAIL_DATA[person];
  if (!pd) return dims.map(function(){return 0;});
  for (var wk in pd) {
    pd[wk].tasks.forEach(function(t) {
      if (!t.score_map) return;
      dims.forEach(function(d) {
        if (t.score_map[d]) { totals[d] += t.score_map[d].value; counts[d]++; }
      });
    });
  }
  return dims.map(function(d) { return counts[d] > 0 ? totals[d]/counts[d] : 0; });
}

function renderWeeklyReport(person, week, data) {
  var prefix = PERSON_PREFIX[person] || 'qian';
  var idx = CHART_DATA.weeks.indexOf(week);
  var pts = data.actual_points;
  var tasks = data.count;
  var allPts = CHART_DATA[prefix + '_points'];
  var allTasks = CHART_DATA[prefix + '_tasks'];
  var avgPts = allPts.reduce(function(a,b){return a+b;}, 0) / allPts.length;
  var avgTasks = allTasks.reduce(function(a,b){return a+b;}, 0) / allTasks.length;
  var prevPts = idx > 0 ? allPts[idx-1] : null;
  var prevTasks = idx > 0 ? allTasks[idx-1] : null;
  var nextPts = idx < allPts.length - 1 ? allPts[idx+1] : null;
  var nextTasks = idx < allTasks.length - 1 ? allTasks[idx+1] : null;

  function trend(v, avg) {
    var diff = v - avg;
    if (Math.abs(diff) < avg * 0.05) return { cls: 'flat', symbol: '→', text: '持平' };
    return diff > 0 ? { cls: 'up', symbol: '↑', text: '高於平均 ' + ((diff/avg)*100).toFixed(0) + '%' } : { cls: 'down', symbol: '↓', text: '低於平均 ' + (Math.abs(diff/avg)*100).toFixed(0) + '%' };
  }
  function prevTrend(v, p) {
    if (p === null) return '';
    var diff = v - p;
    if (Math.abs(diff) < 0.001) return '，與上週持平';
    return diff > 0 ? '，較上週 ' + diff.toFixed(2) + ' ↑' : '，較上週 ' + Math.abs(diff).toFixed(2) + ' ↓';
  }

  // ---- L倫恩 狀態公式（即時判定） ----
  function calcStatus() {
    // 偵測休假日：前後週正常，本週無產能
    if (tasks === 0 || pts === 0) {
      var prevOk = prevPts !== null && prevPts >= avgPts * 0.65;
      var nextOk = nextPts !== null && nextPts >= avgPts * 0.65;
      if (prevOk && nextOk) return { label: '休假', note: '前後週正常，應屬休假', cls: 'leave', icon: '🔷' };
      return { label: '不存在', note: '無任務紀錄', cls: 'none', icon: '⬜' };
    }
    // 豐盛（產出顯著高於平均）
    if (pts > avgPts * 1.25 && tasks > avgTasks * 1.15) return { label: '豐盛', note: '高產出需節約鞏固', cls: 'affluence', icon: '🌟' };
    // 正常（合理範圍）
    if (pts >= avgPts * 0.8) return { label: '正常', note: '穩定', cls: 'normal', icon: '🟢' };
    // 緊急（偏低）
    if (pts >= avgPts * 0.5) return { label: '緊急', note: '低於平均需調整', cls: 'critical', icon: '🔴' };
    // 危險（極低）
    return { label: '危險', note: '點數過低需檢討', cls: 'danger', icon: '🟡' };
  }
  var status = calcStatus();

  // ---- 脈絡指標（供行動步驟使用）----
  var consecDrop = 0;
  for (var i = idx; i > 0 && i > idx - 4; i--) { if (allPts[i] < allPts[i-1]) consecDrop++; else break; }
  var consecRise = 0;
  for (var i = idx; i > 0 && i > idx - 4; i--) { if (allPts[i] > allPts[i-1]) consecRise++; else break; }
  var dropPct = (idx > 0 && allPts[idx-1] > 0) ? (allPts[idx-1] - pts) / allPts[idx-1] : 0;
  var recentDanger = false;
  for (var i = 1; i <= Math.min(2, idx); i++) { if (allPts[idx - i] < avgPts * 0.8) { recentDanger = true; break; } }
  var rollSum = 0; for (var i = 0; i < Math.min(3, idx + 1); i++) rollSum += allPts[idx - i];
  var rollAvg = rollSum / Math.min(3, idx + 1);
  var recovering = recentDanger && pts >= prevPts;

  var ptsTrend = trend(pts, avgPts);
  var taskTrend = trend(tasks, avgTasks);

  var dims = ['時', '技', '影', '複'];
  var dimTotals = {'時': 0, '技': 0, '影': 0, '複': 0};
  var dimCounts = {'時': 0, '技': 0, '影': 0, '複': 0};
  data.tasks.forEach(function(t) {
    if (!t.score_map) return;
    dims.forEach(function(d) {
      if (t.score_map[d]) {
        dimTotals[d] += t.score_map[d].value;
        dimCounts[d]++;
      }
    });
  });
  var dimAvg = {};
  dims.forEach(function(d) { dimAvg[d] = dimCounts[d] > 0 ? dimTotals[d] / dimCounts[d] : 0; });

  var highTasks = data.tasks.filter(function(t) {
    if (!t.score_map) return false;
    return dims.some(function(d) { return t.score_map[d] && t.score_map[d].label === 'H'; });
  });

  // ---- Build HTML ----
  var html = '<div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;">' +
    '<span style="font-size:20px;">' + status.icon + '</span>' +
    '<span style="font-weight:bold;font-size:16px;">本週結算 — ' + DISPLAY_NAMES[person] + ' W' + week + '</span>' +
    '<span style="font-size:12px;padding:2px 10px;border-radius:10px;background:' +
    (status.cls==='leave'?'#3498db':status.cls==='affluence'?'#1abc9c':status.cls==='normal'?'#27ae60':status.cls==='danger'?'#f39c12':status.cls==='critical'?'#e74c3c':'#999') +
    ';color:#fff;">' + status.label + '</span>' +
    '<span class="info-btn" data-info="狀態" style="width:12px;height:12px;font-size:8px;vertical-align:middle;">ⓘ</span>' +
    '<span style="font-size:12px;color:#999;">（' + status.note + '）</span></div>';

  html += '<div class="report-item"><span class="label">行動點數:</span> ' + pts.toFixed(2) + ' 點 ' +
    '<span class="' + ptsTrend.cls + '">' + ptsTrend.symbol + ' ' + ptsTrend.text + '</span>' +
    prevTrend(pts, prevPts) + '</div>';
  html += '<div class="report-item"><span class="label">任務數量:</span> ' + tasks + ' 件 ' +
    '<span class="' + taskTrend.cls + '">' + taskTrend.symbol + ' ' + taskTrend.text + '</span>' +
    prevTrend(tasks, prevTasks) + '</div>';
  var avgTaskScore = tasks > 0 ? (data.total_task_pts / tasks) : 0;
  var overallAvgTaskScore = allPts.reduce(function(a,b,i){return a + allPts[i]/Math.max(allTasks[i],1);}, 0) / allPts.length;
  html += '<div class="report-item"><span class="label">平均每任務點數:</span> ' + avgTaskScore.toFixed(3) + ' 點' +
    '（個人平均 ' + overallAvgTaskScore.toFixed(3) + '）</div>';
  html += '<div class="report-item" style="margin-top:8px;"><span class="label">四維度平均分佈:</span></div>';
  var dimColors = {'時': '#e74c3c', '技': '#f39c12', '影': '#27ae60', '複': '#4a90d9'};
  var dimHint = {'時':'耗時：實際投入的工作時間\nL(＜1天) M(1-2天) H(＞2天)','技':'技術：完成任務所需技能\nL(例行工具) M(專業技能) H(高度專業)','影':'影響：直接影響人數／層級\nL(1-5人) M(6-20人) H(20人↑)','複':'複雜：協調難度\nL(單向溝通) M(多方協作) H(立場衝突)'};
  var personDimAvg = getPersonDimAvg(person);
  html += '<div style="display:flex;gap:16px;flex-wrap:wrap;margin:6px 0;font-size:13px;">';
  dims.forEach(function(d, i) {
    var v = dimAvg[d];
    var pa = personDimAvg[i];
    var arrow = v > pa * 1.05 ? '↑' : v < pa * 0.95 ? '↓' : '→';
    html += '<span style="cursor:help;white-space:nowrap;" title="' + dimHint[d].replace(/\n/g,' | ') + '">' +
      '<span style="color:' + dimColors[d] + ';font-weight:bold;">' + d + '</span> ' +
      v.toFixed(2) + ' ' +
      '<span style="color:#999;font-size:11px;">(個人均 ' + pa.toFixed(2) + ' ' + arrow + ')</span>' +
      '<span class="info-btn" data-info="' + d + '" style="width:11px;height:11px;font-size:7px;line-height:11px;margin-left:2px;">ⓘ</span>' +
      '</span>';
  });
  html += '</div>';
  // ---- 演化標籤（廣度/深度/結構變化/舒適區）----
  html += renderEvolutionLabels(person, week, data);
  // ---- 策略分佈 ----
  var stratCounts = {};
  data.tasks.forEach(function(t) {
    if (t.is_subtask) return;
    var s = t.strategy || '';
    stratCounts[s] = (stratCounts[s] || 0) + 1;
  });
  var stratKeys = Object.keys(stratCounts).sort();
  var stratTotal = stratKeys.reduce(function(a,k){return a+stratCounts[k];}, 0);
  if (stratTotal > 0) {
    html += '<div class="report-item" style="margin-top:8px;"><span class="label">年度策略關聯分佈:</span></div>';
    html += '<div class="strat-dist">';
    stratKeys.forEach(function(k) {
      var m = STRATEGY_META[k] || STRATEGY_DEFAULT;
      var pct = (stratCounts[k] / stratTotal * 100);
      html += '<div class="strat-dist-item">' +
        '<span class="strat-badge" style="background:' + m.bg + ';color:' + m.color + ';border:1px solid ' + m.color + ';">' + m.label + '</span>' +
        '<div class="strat-dist-bar"><div class="strat-dist-fill" style="width:' + pct + '%;background:' + m.color + ';"></div></div>' +
        '<span style="font-size:11px;color:#888;">' + stratCounts[k] + '件 (' + pct.toFixed(0) + '%)</span></div>';
    });
    html += '</div>';
  }
  if (highTasks.length > 0) {
    html += '<div class="report-item"><span class="label">高複雜度任務（含 H 級）:</span> ' + highTasks.length + ' 件</div>';
    highTasks.forEach(function(t, i) {
      if (i < 3) html += '<div style="font-size:12px;color:#666;padding-left:14px;">· ' + htmlEscape(t.desc.length > 30 ? t.desc.substring(0,30) + '…' : t.desc) + '</div>';
    });
    if (highTasks.length > 3) html += '<div style="font-size:12px;color:#999;padding-left:14px;">… 還有 ' + (highTasks.length - 3) + ' 件</div>';
  } else {
    html += '<div class="report-item"><span class="label">高複雜度任務:</span> 無</div>';
  }
  // ---- 綜合評分（A/B/C/D） ----
  function calcCompositeScore() {
    var stScore = status.label === '豐盛' ? 98 : status.label === '正常' ? 95 : status.label === '休假' ? 75 : status.label === '緊急' ? 60 : status.label === '危險' ? (recovering ? 35 : 20) : 10;
    var ptsRatio = pts / avgPts;
    var ptsScore = ptsRatio >= 1.2 ? 100 : ptsRatio >= 0.9 ? 80 : ptsRatio >= 0.7 ? 60 : ptsRatio >= 0.5 ? 40 : 20;
    var taskRatio = tasks / avgTasks;
    var taskScore = taskRatio >= 1.2 ? 100 : taskRatio >= 0.9 ? 80 : taskRatio >= 0.7 ? 60 : taskRatio >= 0.5 ? 40 : 20;
    var effRatio = avgTaskScore / overallAvgTaskScore;
    var effScore = effRatio >= 1.2 ? 100 : effRatio >= 0.9 ? 80 : effRatio >= 0.7 ? 60 : effRatio >= 0.5 ? 40 : 20;
    var trendScore = 50;
    if (prevPts !== null) {
      var chg = (pts - prevPts) / prevPts;
      trendScore = chg > 0.1 ? 90 : chg > 0 ? 70 : chg === 0 ? 50 : chg > -0.1 ? 40 : chg > -0.3 ? 30 : 10;
    }
    var total = ptsScore * 0.30 + taskScore * 0.15 + stScore * 0.25 + effScore * 0.15 + trendScore * 0.15;
    var grade = total >= 80 ? 'A' : total >= 60 ? 'B' : total >= 40 ? 'C' : 'D';
    var grades = {A: {ch: '優', clr: '#27ae60', desc: '表現優異'}, B: {ch: '良', clr: '#2980b9', desc: '穩定達標'}, C: {ch: '可', clr: '#f39c12', desc: '需留意'}, D: {ch: '待加強', clr: '#e74c3c', desc: '需加強'}};
    return { score: Math.round(total), grade: grade, ch: grades[grade].ch, color: grades[grade].clr, desc: grades[grade].desc, ptsWeight: Math.round(ptsScore * 0.30), stWeight: Math.round(stScore * 0.25) };
  }
  function generateSummary(comp) {
    var bestDim = dims.slice().sort(function(a,b) { return dimAvg[b] - dimAvg[a]; })[0];
    var worstDim = dims.slice().sort(function(a,b) { return dimAvg[a] - dimAvg[b]; })[0];
    var dimLabels = {'時': '即時反應', '技': '技術深度', '影': '影響力', '複': '複雜統籌'};
    var ptsDesc = pts >= avgPts * 1.1 ? '高於平均' : pts >= avgPts * 0.9 ? '接近平均' : '低於平均';
    var taskDesc = tasks >= avgTasks * 1.1 ? '任務量充足' : tasks >= avgTasks * 0.8 ? '任務量適中' : '任務量偏低';
    var trendDir = prevPts !== null ? (pts > prevPts ? '，較上週上升' : pts < prevPts ? '，較上週下降' : '，與上週持平') : '';
    var statusDesc = status.label === '豐盛' ? '產出豐盛，需節約鞏固避免下滑' : status.label === '正常' ? '目前狀態穩定' : status.label === '休假' ? '休假中，產能較低屬正常' : status.label === '緊急' ? '出現下滑警示，需立即調整' : status.label === '危險' ? (recovering ? '正在回升中' : '需全面檢討工作方式') : '本週無任務紀錄';
    return DISPLAY_NAMES[person] + '本週行動點數 ' + pts.toFixed(2) + ' 點，' + ptsDesc + '（個人平均 ' + avgPts.toFixed(2) + '）' + trendDir + '。任務 ' + tasks + ' 件，' + taskDesc + '（平均 ' + avgTasks.toFixed(1) + ' 件）。四維度中「' + dimLabels[bestDim] + '」（' + dimAvg[bestDim].toFixed(2) + '）表現最佳，「' + dimLabels[worstDim] + '」（' + dimAvg[worstDim].toFixed(2) + '）可再加強。' + statusDesc + '。綜合評分 ' + comp.ch + '級（' + comp.score + '分），' + comp.desc + '。';
  }
  var comp = calcCompositeScore();
  var summary = generateSummary(comp);
  html += '<div style="display:flex;align-items:center;gap:8px;margin:6px 0 10px;">' +
    '<span style="font-size:22px;font-weight:bold;color:' + comp.color + ';">' + comp.ch + '</span>' +
    '<span style="font-size:13px;color:#888;">綜合評分 ' + comp.score + ' 分 · ' + comp.desc + '</span>' +
    '<span class="info-btn" data-info="綜合評分" style="width:12px;height:12px;font-size:8px;">ⓘ</span></div>';
  html += '<div style="font-size:13px;color:#555;line-height:1.7;padding:10px;background:#f8f9fa;border-radius:6px;margin-bottom:10px;border-left:3px solid ' + comp.color + ';">' + summary + '</div>';
  // ---- 狀態對應行動步驟（依角色區分）----
  var isSelf = person === '俊';
  var steps = [];
  if (status.label === '休假') {

    }
  } else if (status.label === '緊急') {
    if (isSelf) {
      steps.push('【點數或趨勢出現警示，需立即調整】');
      steps.push('① 鎖定能快速產出的高優先任務：先做有明確成果的事，扭轉下滑趨勢');
      steps.push('② 減少非必要會議與行政：集中火力在核心任務');

    } else {
      if (avgTaskScore < overallAvgTaskScore) steps.push('該員任務難度偏低，可考慮指派更高複雜度的工作');

      if (steps.length === 0) steps.push('各項指標與個人平均相近，維持現有安排即可');
    }
  }
  html += '<div class="report-item" style="margin-top:8px;"><span class="label">建議行動步驟:</span></div>';

function computeDimDistribution(person) {
  var dims = ['時','技','影','複'];
  var cnt = {時:{L:0,M:0,H:0},技:{L:0,M:0,H:0},影:{L:0,M:0,H:0},複:{L:0,M:0,H:0}};
  var pd = DETAIL_DATA[person]; if (!pd) return cnt;
  for (var wk in pd) { pd[wk].tasks.forEach(function(t) { if (!t.score_map) return; dims.forEach(function(d) { if (t.score_map[d]) { var lbl = t.score_map[d].label; if (cnt[d][lbl]!==undefined) cnt[d][lbl]++; } }); }); }
  return cnt;
}
function renderDimDistribution() {
  var dims = ['時','技','影','複'];
  var dimTitles = {'時':'耗時：實際投入的工作時間\nL(＜1天) M(1-2天) H(＞2天)','技':'技術：完成任務所需技能\nL(例行工具) M(專業技能) H(高度專業)','影':'影響：直接影響人數／層級\nL(1-5人) M(6-20人) H(20人↑)','複':'複雜：協調難度\nL(單向溝通) M(多方協作) H(立場衝突)'};
  var dimColors = {'時':'#e74c3c','技':'#f39c12','影':'#27ae60','複':'#4a90d9'};
  var segColors = {'L':'#e74c3c','M':'#f39c12','H':'#27ae60'};
  var segLabels = {'L':'低','M':'中','H':'高'};
  var ppl = ['岍叡','盈萱','俊'];
  var display = {'岍叡':'岍叡','盈萱':'盈萱','俊':'俊培'};
  var html = '<table class="dim-dist-table"><tr><th>人員</th>';
  dims.forEach(function(d) { html += '<th style="cursor:help;color:'+dimColors[d]+';" title="'+dimTitles[d].replace(/\n/g,' | ')+'">'+d+'</th>'; });
  html += '</tr>';
  ppl.forEach(function(p) {
    var dist = computeDimDistribution(p);
    html += '<tr><td class="person-name">'+display[p]+'</td>';
    dims.forEach(function(d) {
      var total = (dist[d]['L']||0)+(dist[d]['M']||0)+(dist[d]['H']||0);
      if (total===0) { html += '<td><span style="color:#ccc;">-</span></td>'; return; }
      var lPct=(dist[d]['L']||0)/total*100, mPct=(dist[d]['M']||0)/total*100, hPct=(dist[d]['H']||0)/total*100;
      html += '<td><div class="dim-dist-bar">';
      html += '<div class="seg" style="width:'+lPct+'%;background:'+segColors.L+';" title="低 '+segLabels.L+' '+(dist[d]['L']||0)+'件"></div>';
      html += '<div class="seg" style="width:'+mPct+'%;background:'+segColors.M+';" title="中 '+segLabels.M+' '+(dist[d]['M']||0)+'件"></div>';
      html += '<div class="seg" style="width:'+hPct+'%;background:'+segColors.H+';" title="高 '+segLabels.H+' '+(dist[d]['H']||0)+'件"></div>';
      html += '</div><div class="dim-dist-total">'+total+'件</div></td>';
    });
    html += '</tr>';
  });
  html += '</table><div style="margin-top:8px;display:flex;gap:12px;justify-content:center;font-size:11px;color:#888;">';
  html += '<span><span style="display:inline-block;width:10px;height:10px;background:#e74c3c;border-radius:2px;margin-right:3px;"></span> L 低</span>';
  html += '<span><span style="display:inline-block;width:10px;height:10px;background:#f39c12;border-radius:2px;margin-right:3px;"></span> M 中</span>';
  html += '<span><span style="display:inline-block;width:10px;height:10px;background:#27ae60;border-radius:2px;margin-right:3px;"></span> H 高</span>';
  html += '<span style="cursor:help;" title="'+'耗時：實際投入的工作時間 | 技術：完成任務所需技能 | 影響：直接影響人數／層級 | 複雜：協調難度'+'">📖 懸停維度標題看定義</span>';
  html += '</div>';
  document.getElementById('dimDistContainer').innerHTML = html;
}

var stratTrendChart = null;
var stratTrendPerson = '岍叡';
function renderStrategyTrend(person) {
  stratTrendPerson = person;
  var ctx = document.getElementById('stratTrendChart'); if (!ctx) return;
  if (stratTrendChart) stratTrendChart.destroy();
  var sdata = STRATEGY_TREND_DATA[person]; if (!sdata) { stratTrendChart=null; return; }
  var cats = Object.keys(STRATEGY_META).filter(function(c){return sdata && Object.values(sdata).some(function(wd){return wd[c]>0;});});
  if (cats.length===0) cats = Object.keys(STRATEGY_META);
  var wks = CHART_DATA.weeks, labels = CHART_DATA.labels;
  var datasets = cats.map(function(cat,ci) {
    var m = STRATEGY_META[cat] || STRATEGY_DEFAULT;
    var col = m.color;
    var pcts = wks.map(function(wk) {
      var wd = sdata[String(wk)]; if (!wd) return 0;
      var total=0, cv=0; for (var k in wd) { if(k==='') continue; total+=wd[k]; if(k===cat) cv=wd[k]; }
      return total>0? +(cv/total*100).toFixed(1):0;
    });
    return {label:cat, data:pcts, borderColor:col, backgroundColor:col+'44', pointBackgroundColor:col, pointRadius:3, pointHoverRadius:5, tension:0.3, fill:true, borderWidth:2};
  });
  var uncl = wks.map(function(wk) {
    var wd=sdata[String(wk)]; if(!wd) return 0;
    var uv=(wd['']||0), tot=0; for(var k in wd) {if(k!=='') tot+=wd[k];}
    var all=tot+uv; return all>0?+(uv/all*100).toFixed(1):0;
  });
  datasets.push({label:'未分類', data:uncl, borderColor:'#ccc', backgroundColor:'rgba(200,200,200,0.1)', borderDash:[4,3], pointBackgroundColor:'#ccc', pointRadius:2, pointHoverRadius:4, tension:0.3, fill:false, borderWidth:1.5});
  stratTrendChart = new Chart(ctx.getContext('2d'), {
    type:'line', data:{labels:labels, datasets:datasets},
    options:{
      responsive:true, maintainAspectRatio:false, interaction:{mode:'nearest',axis:'x'},
      plugins:{ legend:{position:'bottom', labels:{font:{size:11},boxWidth:14,padding:12}}, tooltip:{callbacks:{label:function(im){return im.dataset.label+': '+im.parsed.y+'%';}}} },
      scales:{ x:{grid:{display:false}, ticks:{font:{size:9}}}, y:{beginAtZero:true, max:100, grid:{color:'rgba(0,0,0,0.06)'}, ticks:{font:{size:10}, callback:function(v){return v+'%';}}} },
      onClick: function(e) {
        var pts = stratTrendChart.getElementsAtEventForMode(e, 'nearest', {intersect:true}, true);
        if (pts.length===0) return;
        var idx = pts[0].index, wk = CHART_DATA.weeks[idx];
        showDetail(stratTrendPerson, wk);
      }
    }
  });
}

  document.querySelectorAll('#stratPersonToggle .switch-btn').forEach(function(b) { b.classList.toggle('active', b.dataset.sperson===person); });
  document.querySelectorAll('[data-rperson]').forEach(function(b) { b.classList.toggle('active', b.dataset.rperson === person); });

var _comfortCache = {};
function getComfortZones(person) {
  if (_comfortCache[person]) return _comfortCache[person];
  var cnts = {}; var pd = DETAIL_DATA[person]; if (!pd) return cnts;
  for (var wk in pd) { pd[wk].tasks.forEach(function(t) { cnts[t.desc] = (cnts[t.desc]||0)+1; }); }
  _comfortCache[person] = cnts; return cnts;
}
function renderEvolutionLabels(person, week, data) {
  var wk_s = String(week), ed = EVOLUTION_DATA[person] && EVOLUTION_DATA[person][wk_s];
  if (!ed) return '';
  var html = '<div class="evo-labels">';
  var ib = '<span class="info-btn" data-info="';
  var ic = '" style="width:11px;height:11px;font-size:7px;line-height:11px;">ⓘ</span>';
  html += '<span class="evo-badge breadth" title="本週不同任務描述的種類數量，越高代表任務多元">📐 廣度 ' + ed.breadth + ' 種' + ib + '廣度' + ic + '</span>';
  html += '<span class="evo-badge depth" title="本週任務平均點數，反映任務難度與複雜度">📏 深度 ' + ed.depth.toFixed(3) + ib + '深度' + ic + '</span>';
  if (ed.structure_shift && ed.structure_shift.length>0) { html += '<span class="evo-badge shift" title="與前4週相比，年度策略類別的新增或消失">🔄 結構變化: '+ed.structure_shift.join(', ')+ib+'結構變化'+ic+'</span>'; }
  else { html += '<span class="evo-badge shift" style="opacity:0.5;" title="與前4週相比，策略結構未有明顯變化">🔄 結構穩定'+ib+'結構變化'+ic+'</span>'; }
  var zones=getComfortZones(person), cc=0, ns=0;
  data.tasks.forEach(function(t) { if(!isRoutineDesc(t.desc) && zones[t.desc]>=3) cc++; if(t.strategy && t.strategy!=='行政營運' && ed.prev4Strats && ed.prev4Strats.indexOf(t.strategy)===-1) ns++; });
  if(cc>0) html += '<span class="evo-badge breadth" style="background:#f3e5f5;color:#7b1fa2;cursor:help;" title="重複出現3次以上的任務描述，可能落入慣性區">⭐ 舒適區 '+cc+' 件'+ib+'舒適區'+ic+'</span>';
  if(ns>0) html += '<span class="evo-badge shift-up" style="cursor:help;" title="過去4週未出現過的策略類別，反映新的工作方向">✨ 新策略 '+ns+' 件'+ib+'新策略'+ic+'</span>';
  html += '</div>'; return html;
}

var polarChart = null;
var RADIAL_STRATS = ['人力生態圈','信任合作','品牌設計','數位研發','法令便利','行政營運','未分類'];
var RADIAL_COLORS = {'人力生態圈':'#8e44ad','信任合作':'#e74c3c','品牌設計':'#e67e22','數位研發':'#1abc9c','法令便利':'#2980b9','行政營運':'#95a5a6','未分類':'#bdc3c7'};
var PERSON_COLORS = {'俊':'#27AE60','盈萱':'#2980B9','岍叡':'#D35400'};

function getStrategyCounts(person) {
  var counts = {};
  RADIAL_STRATS.forEach(function(s) { counts[s] = 0; });
  (RADIAL_DATA[person] || []).forEach(function(d) {
    if (counts[d.s] !== undefined) counts[d.s]++;
  });
  return RADIAL_STRATS.map(function(s) { return counts[s]; });
}

function createPolarChart(personMode) {
  var ctx = document.getElementById('radialChart').getContext('2d');
  if (polarChart) polarChart.destroy();

  var labels = RADIAL_STRATS;
  var data, bgColors, bdColors, labelPrefix;

  if (personMode === 'all') {
    labelPrefix = '團隊';
    data = labels.map(function(s, i) {
      var total = 0;
      ALL_PERSONS.forEach(function(p) { total += getStrategyCounts(p)[i]; });
      return total;
    });
    bgColors = labels.map(function(s) { return (RADIAL_COLORS[s]||'#999') + '80'; });
    bdColors = labels.map(function(s) { return RADIAL_COLORS[s]||'#999'; });
  } else {
    labelPrefix = DISPLAY_NAMES[personMode];
    data = getStrategyCounts(personMode);
    bgColors = labels.map(function(s) { return (RADIAL_COLORS[s]||'#999') + '90'; });
    bdColors = labels.map(function(s) { return RADIAL_COLORS[s]||'#999'; });
  }

  var totalAll = data.reduce(function(a,b){return a+b;}, 0);

  polarChart = new Chart(ctx, {
    type: 'polarArea',
    data: {
      labels: labels,
      datasets: [{
        data: data,
        backgroundColor: bgColors,
        borderColor: bdColors,
        borderWidth: 1
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      scales: {
        r: {
          grid: { color: 'rgba(0,0,0,0.08)' },
          angleLines: { color: 'rgba(0,0,0,0.1)' },
          ticks: { display: false, stepSize: 10 },
          suggestedMin: 0
        }
      },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: 'rgba(0,0,0,0.8)',
          bodyFont: { size: 12 },
          padding: 8,
          callbacks: {
            label: function(item) {
              var pct = totalAll > 0 ? ((item.raw / totalAll) * 100).toFixed(1) : 0;
              return item.label + ': ' + item.raw + ' 件 (' + pct + '%)';
            }
          }
        }
      },
      onClick: function(e) {
        if (personMode === 'all') return;
        var els = polarChart.getElementsAtEventForMode(e, 'nearest', { intersect: true }, true);
        if (!els || els.length === 0) return;
        var strat = polarChart.data.labels[els[0].index];
        showDetailStrategy(personMode, strat);
      }
    }
  });

  var leg = document.getElementById('radialLegend');
  if (personMode === 'all') {
    leg.innerHTML = ALL_PERSONS.map(function(p) {
      return '<span class="radial-legend-item"><span class="dot" style="background:' + PERSON_COLORS[p] + '"></span>' + DISPLAY_NAMES[p] + '</span>';
    }).join('') + ' &nbsp;·&nbsp; 扇形面積 = 任務數量 &nbsp;·&nbsp; 越大越集中';
  } else {
    leg.innerHTML = RADIAL_STRATS.map(function(s) {
      var c = RADIAL_COLORS[s]||'#999';
      return '<span class="radial-legend-item"><span class="dot" style="background:' + c + '"></span>' + s + '</span>';
    }).join('') + ' &nbsp;·&nbsp; 扇形面積 = 任務數量 &nbsp;·&nbsp; 點擊扇形查看該策略任務清單';
  }
}

function switchRadialPerson(person) {
  document.querySelectorAll('[data-rperson]').forEach(function(b) {
    b.classList.toggle('active', b.dataset.rperson === person);
  });
  createPolarChart(person);
  if (person !== 'all') {
    document.querySelectorAll('#stratPersonToggle .switch-btn').forEach(function(b) { b.classList.toggle('active', b.dataset.sperson === person); });
    renderStrategyTrend(person);
  }
}

function toggleInfo(key, targetEl) {
  var existing = document.querySelector('.info-tooltip[data-info="'+key+'"]');
  if (existing) { existing.remove(); return; }
  document.querySelectorAll('.info-tooltip').forEach(function(t){t.remove();});
  var data = INFO_DATA[key];
  if (!data) return;
  var rect = targetEl.getBoundingClientRect();
  var html = '<div class="info-tooltip" data-info="'+key+'" style="top:'+(rect.bottom+6)+'px;left:'+Math.min(rect.left, window.innerWidth-360)+'px;">'+
    '<span class="close-tip" onclick="this.parentElement.remove()">✕</span>'+
    '<h4>'+data.title+'</h4>'+
    '<p><strong>定義：</strong>'+data.def+'</p>'+
    (data.calc ? '<p><strong>計算：</strong>'+data.calc.replace(/\n/g,'<br>')+'</p>' : '')+
    (data.items ? '<p>'+data.items.map(function(x){return'• '+x;}).join('<br>')+'</p>' : '')+
    (data.high ? '<p><strong>高值：</strong>'+data.high+'</p>' : '')+
    (data.low ? '<p><strong>低值：</strong>'+data.low+'</p>' : '')+
    (data.note ? '<p style="color:#888;font-size:11px;margin-top:4px;border-top:1px solid #eee;padding-top:4px;">💡 '+data.note+'</p>' : '')+
    '</div>';
  document.body.insertAdjacentHTML('beforeend', html);
}

document.addEventListener('click', function(e) {
  var btn = e.target.closest('.info-btn');
  if (btn) {
    e.stopPropagation();
    var key = btn.getAttribute('data-info');
    if (key) toggleInfo(key, btn);
    return;
  }
  if (!e.target.closest('.info-tooltip')) {
    document.querySelectorAll('.info-tooltip').forEach(function(t){t.remove();});
  }
});

// 判讀句產生器
// ═══════════════════════════════════════
function interpretPoints(person, pts, avgPts, prevPts) {
  var rel = pts >= avgPts * 1.1 ? '高於' : pts >= avgPts * 0.9 ? '接近' : '低於';
  var trend = prevPts !== null ? (pts > prevPts ? '，較上週上升' : pts < prevPts ? '，較上週下降' : '，與上週持平') : '';
  return '<span class="interp-text">本週行動點數 <span class="interp-em">' + pts.toFixed(2) + '</span> 點，' + rel + '個人平均（' + avgPts.toFixed(2) + '）' + trend + '。</span>';
}
function interpretTasks(tasks, avgTasks) {
  var rel = tasks >= avgTasks * 1.1 ? '高於' : tasks >= avgTasks * 0.9 ? '接近' : '低於';
  var cat = tasks >= avgTasks * 1.15 ? '，工作量充足' : tasks >= avgTasks * 0.8 ? '，工作量適中' : '，工作量偏少';
  return '<span class="interp-text">本週任務 <span class="interp-em">' + tasks + '</span> 件，' + rel + '個人平均（' + avgTasks.toFixed(1) + '件）' + cat + '。</span>';
}
function interpretStatus(status) {
  var notes = {'豐盛':'產出充足，需注意節約鞏固','正常':'目前狀態穩定','緊急':'低於平均，建議優先檢視任務安排','危險':'明顯偏低，建議立即檢視工作方式','休假':'前後週正常，應屬休假狀態','不存在':'本週無任務紀錄'};
  var icons = {'豐盛':'🌟','正常':'🟢','緊急':'🔴','危險':'🟡','休假':'🔷','不存在':'⬜'};
  return '<span class="interp-text">狀態 ' + (icons[status.label]||'') + ' <span class="interp-em">' + status.label + '</span> — ' + (notes[status.label]||'') + '。</span>';
}
function interpretScore(comp) {
  return '<span class="interp-text">綜合評分 <span class="interp-em">' + comp.ch + '級（' + comp.score + '分）</span>，' + comp.desc + '。</span>';
}
function interpretBreadth(b) {
  return '<span class="interp-text">廣度 <span class="interp-em">' + b + '</span> 種' + (b >= 10 ? '，任務類型較分散，接觸面廣。' : b <= 3 ? '，工作內容較集中。' : '，工作多樣性適中。') + '</span>';
}
function interpretDepth(d) {
  var desc = d >= 2.5 ? '任務偏中高難度，較接近專案型工作。' : d >= 1.5 ? '任務難度適中。' : '任務偏例行性，難度較低。';
  return '<span class="interp-text">深度 <span class="interp-em">' + d.toFixed(3) + '</span>，' + desc + '</span>';
}
function interpretShift(shift) {
  if (!shift || shift.length === 0) return '<span class="interp-text">🔄 結構穩定，策略方向與前4週一致。</span>';
  return '<span class="interp-text">🔄 結構變化：<span class="interp-em">' + shift.join('、') + '</span>，工作重心可能正在改變。</span>';
}
function interpretComfort(cc) {
  if (cc === 0) return '<span class="interp-text">本週無重複出現的舒適區任務（例行任務不計）。</span>';
  return '<span class="interp-text">⭐ 有 <span class="interp-em">' + cc + '</span> 件任務落入舒適區（出現3次以上，不含例行任務），需留意是否缺少新挑戰。</span>';
}
function interpretNovel(ns) {
  if (ns === 0) return '<span class="interp-text">本週策略類型延續過去模式，無新方向。</span>';
  return '<span class="interp-text">✨ 出現 <span class="interp-em">' + ns + '</span> 個新策略方向，工作重心可能正在擴張。</span>';
}

// ═══════════════════════════════════════
// 上週比較
// ═══════════════════════════════════════
function renderWeeklyComparison(person, week, data) {
  var allWks = CHART_DATA.weeks;
  var idx = allWks.indexOf(week);
  if (idx <= 0) return '';
  var prevWeek = allWks[idx - 1];
  var prevData = DETAIL_DATA[person] && DETAIL_DATA[person][prevWeek];
  if (!prevData) return '';
  var prefix = PERSON_PREFIX[person] || 'qian';
  var allPts = CHART_DATA[prefix + '_points'];
  var allTasks = CHART_DATA[prefix + '_tasks'];
  var ptsNow = allPts[idx], ptsPrev = allPts[idx-1];
  var tasksNow = allTasks[idx], tasksPrev = allTasks[idx-1];
  function pctChg(now, prev) {
    if (prev === 0) return now > 0 ? '+∞' : '0%';
    var d = ((now - prev) / prev * 100);
    return (d > 0 ? '+' : '') + d.toFixed(0) + '%';
  }
  function arrow(v) { return v > 0 ? '<span class="interp-up">↑</span>' : v < 0 ? '<span class="interp-down">↓</span>' : '<span class="interp-flat">→</span>'; }
  var lines = ['<span class="cmp-item">行動點數 ' + arrow(ptsNow - ptsPrev) + ' ' + pctChg(ptsNow, ptsPrev) + '</span>'];
  lines.push('<span class="cmp-item">任務數量 ' + arrow(tasksNow - tasksPrev) + ' ' + (tasksNow - tasksPrev > 0 ? '+' : '') + (tasksNow - tasksPrev) + ' 件</span>');
  // Compare strategy distribution
  var curStrats = {}, prevStrats = {};
  data.tasks.forEach(function(t) { if (!t.is_subtask) { var s = t.strategy || '未分類'; curStrats[s] = (curStrats[s]||0)+1; }});
  prevData.tasks.forEach(function(t) { if (!t.is_subtask) { var s = t.strategy || '未分類'; prevStrats[s] = (prevStrats[s]||0)+1; }});
  var allStrats = Object.keys(curStrats).concat(Object.keys(prevStrats)).filter(function(v,i,a){return a.indexOf(v)===i;});
  allStrats.forEach(function(s) {
    var c = (curStrats[s]||0), p = (prevStrats[s]||0);
    if (c !== p) lines.push('<span class="cmp-item">' + s + ' ' + arrow(c-p) + ' ' + (c-p > 0 ? '+' : '') + (c-p) + ' 件</span>');
  });
  // Composite score change
  var vs = document.querySelector('#detailSummary .interp-text:last-child');
  return '<div class="week-compare"><div class="cmp-title">較上週 W' + prevWeek + ' 比較</div><div class="cmp-row">' + lines.join('') + '</div></div>';
}

// 個人平均參考線 + 趨勢投影線 (Chart.js plugins)
// ═══════════════════════════════════════
// 平均線：淡化虛線，僅供區間參考
Chart.register({
  id: 'avgRefLines',
  afterDraw: function(chart) {
    if (chart.canvas.id !== 'mainChart') return;
    var yScale = chart.scales.y;
    if (!yScale) return;
    var ctx = chart.ctx;
    chart.data.datasets.forEach(function(ds) {
      var values = ds.data.filter(function(v) { return v !== null && v !== undefined; });
      if (values.length === 0) return;
      var avg = values.reduce(function(a,b){return a+b;}, 0) / values.length;
      var y = yScale.getPixelForValue(avg);
      ctx.save();
      ctx.setLineDash([3, 5]);
      ctx.strokeStyle = ds.borderColor + '40';
      ctx.lineWidth = 0.8;
      ctx.beginPath();
      ctx.moveTo(chart.chartArea.left, y);
      ctx.lineTo(chart.chartArea.right, y);
      ctx.stroke();
      ctx.restore();
    });
  }
});
// 趨勢投影線：最後 3 週線性迴歸，外推 2 週作為短箭頭
Chart.register({
  id: 'trendProjection',
  afterDraw: function(chart) {
    if (chart.canvas.id !== 'mainChart') return;
    var yScale = chart.scales.y;
    var xScale = chart.scales.x;
    if (!yScale || !xScale) return;
    var ctx = chart.ctx;
    chart.data.datasets.forEach(function(ds) {
      var pts = ds.data;
      var valid = [];
      for (var i = 0; i < pts.length; i++) {
        if (pts[i] !== null && pts[i] !== undefined) valid.push({ x: i, y: pts[i] });
      }
      if (valid.length < 4) return;
      // Use last 3 points for short-term regression
      var last3 = valid.slice(-3);
      var n = last3.length;
      var sumX = 0, sumY = 0, sumXY = 0, sumX2 = 0;
      for (var j = 0; j < n; j++) {
        sumX += last3[j].x;
        sumY += last3[j].y;
        sumXY += last3[j].x * last3[j].y;
        sumX2 += last3[j].x * last3[j].x;
      }
      var denom = n * sumX2 - sumX * sumX;
      if (Math.abs(denom) < 1e-10) return;
      var slope = (n * sumXY - sumX * sumY) / denom;
      var intercept = (sumY - slope * sumX) / n;
      // Last data point position
      var lastIdx = valid[valid.length - 1].x;
      var lastVal = valid[valid.length - 1].y;
      var x0 = xScale.getPixelForValue(lastIdx);
      var y0 = yScale.getPixelForValue(lastVal);
      // Project 2 weeks forward
      var x1 = xScale.getPixelForValue(lastIdx + 2 > valid.length + 1 ? 0 : lastIdx + 2);
      // If category scale returns same pixel, calculate offset manually
      var unitPx = xScale.getPixelForValue(lastIdx) - xScale.getPixelForValue(Math.max(0, lastIdx - 1));
      if (unitPx <= 0) unitPx = 40;
      var projPx = x0 + unitPx * 2;
      var projVal = slope * (lastIdx + 2) + intercept;
      var projY = yScale.getPixelForValue(projVal);
      // Semi-transparent projection line
      ctx.save();
      ctx.strokeStyle = ds.borderColor + '60';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(x0, y0);
      ctx.lineTo(projPx, projY);
      ctx.stroke();
      // Arrow head at projection end
      ctx.setLineDash([]);
      ctx.fillStyle = ds.borderColor;
      var angle = Math.atan2(y0 - projY, projPx - x0);
      var aSize = 7;
      ctx.beginPath();
      ctx.moveTo(projPx, projY);
      ctx.lineTo(projPx - aSize * Math.cos(angle - 0.4), projY + aSize * Math.sin(angle - 0.4));
      ctx.lineTo(projPx - aSize * Math.cos(angle + 0.4), projY + aSize * Math.sin(angle + 0.4));
      ctx.closePath();
      ctx.fill();
      // Zone label at projection end
      var allAvg = valid.reduce(function(a,b){return a+b.y;}, 0) / valid.length;
      var zoneLabel, zoneColor;
      if (projVal > allAvg * 1.25) { zoneLabel = '豐盛'; zoneColor = '#F1C40F'; }
      else if (projVal >= allAvg * 0.8) { zoneLabel = '正常'; zoneColor = '#27AE60'; }
      else if (projVal >= allAvg * 0.5) { zoneLabel = '緊急'; zoneColor = '#E67E22'; }
      else { zoneLabel = '危險'; zoneColor = '#E74C3C'; }
      ctx.font = 'bold 10px sans-serif';
      ctx.fillStyle = zoneColor;
      ctx.textAlign = 'left';
      ctx.textBaseline = 'bottom';
      ctx.fillText(zoneLabel, projPx + 4, projY - 2);
      ctx.restore();
    });
  }
});

// ═══════════════════════════════════════
// 本週提醒區
// ═══════════════════════════════════════
function computeWeeklyReminder() {
  var items = [];
  var lastWk = CHART_DATA.weeks[CHART_DATA.weeks.length - 1];
  ALL_PERSONS.forEach(function(p) {
    var prefix = PERSON_PREFIX[p] || 'qian';
    var allPts = CHART_DATA[prefix + '_points'];
    var allTasks = CHART_DATA[prefix + '_tasks'];
    var idx = CHART_DATA.weeks.indexOf(lastWk);
    if (idx < 0) return;
    var pts = allPts[idx], tasks = allTasks[idx];
    var avgPts = allPts.reduce(function(a,b){return a+b;}, 0) / allPts.length;
    var avgTasks = allTasks.reduce(function(a,b){return a+b;}, 0) / allTasks.length;
    var dn = DISPLAY_NAMES[p];
    if (pts < avgPts * 0.7) items.push({ type: 'warn', text: '⚠ ' + dn + ' 行動點數 ' + pts.toFixed(2) + ' 低於個人平均 (' + avgPts.toFixed(2) + ')，建議確認任務安排。' });
    if (tasks === 0) items.push({ type: 'warn', text: '⚠ ' + dn + ' 本週無任務紀錄，請確認是否漏登。' });
    if (pts > avgPts * 1.3) items.push({ type: 'ok', text: '✅ ' + dn + ' 本週產出 ' + pts.toFixed(2) + ' 點，高於個人平均，表現良好。' });
    // Check for strat migration
    var ed = EVOLUTION_DATA[p] && EVOLUTION_DATA[p][String(lastWk)];
    if (ed && ed.structure_shift && ed.structure_shift.length >= 2) {
      items.push({ type: 'info', text: 'ℹ ' + dn + ' 策略結構出現變化：' + ed.structure_shift.join('、') + '，可能代表角色正在轉型。' });
    }
  });
  if (items.length === 0) {
    items.push({ type: 'ok', text: '✅ 本週所有人狀態正常。' });
  }
  // Deduplicate and limit
  var seen = {}, unique = [];
  items.forEach(function(it) {
    if (seen[it.text]) return;
    seen[it.text] = true;
    unique.push(it);
  });
  var container = document.getElementById('reminderItems');
  var wrapper = document.getElementById('weeklyReminder');
  container.innerHTML = unique.slice(0, 5).map(function(it) {
    return '<span class="reminder-item ' + it.type + '">' + it.text + '</span>';
  }).join('');
  wrapper.style.display = unique.length > 0 ? 'flex' : 'none';
}

// ═══════════════════════════════════════
// 策略遷徙提示 & 邊際遞減警示
// ═══════════════════════════════════════
function strategyMigrationHint(person) {
  var ed = EVOLUTION_DATA[person];
  if (!ed) return '';
  var wks = Object.keys(ed).sort(function(a,b){return parseInt(a)-parseInt(b);});
  var last3 = wks.slice(-3);
  var shiftCounts = {};
  last3.forEach(function(w) {
    var s = ed[w].structure_shift || [];
    s.forEach(function(st) { shiftCounts[st] = (shiftCounts[st]||0)+1; });
  });
  var hints = [];
  for (var s in shiftCounts) {
    if (shiftCounts[s] >= 2) hints.push(s + ' 連續 ' + shiftCounts[s] + ' 週出現');
  }
  if (hints.length > 0) {
    return '<div style="font-size:11px;color:#e67e22;background:#fef9e7;padding:4px 10px;border-radius:4px;margin:4px 0;">🔄 ' + DISPLAY_NAMES[person] + ' ' + hints.join('、') + '，可能正在轉移工作重心。</div>';
  }
  return '';
}

function diminishingReturnWarning(person) {
  var prefix = PERSON_PREFIX[person] || 'qian';
  var pts = CHART_DATA[prefix + '_points'];
  var idx = pts.length - 1;
  if (idx < 2) return '';
  var rises = [], drops = [];
  for (var i = Math.max(0, idx-4); i <= idx; i++) {
    if (i === 0) continue;
    var chg = pts[i] - pts[i-1];
    if (chg > 0) rises.push(chg);
    else drops.push(chg);
  }
  if (rises.length >= 3) {
    var ratios = [];
    for (var i = 1; i < rises.length; i++) {
      if (rises[i-1] > 0) ratios.push(rises[i] / rises[i-1]);
    }
    if (ratios.length >= 2 && ratios[ratios.length-1] < 0.5) {
      return '<div style="font-size:11px;color:#e74c3c;background:#fdedec;padding:4px 10px;border-radius:4px;margin:4px 0;">📉 ' + DISPLAY_NAMES[person] + ' 連續上升但增幅遞減，產能可能正在高原停滯，建議關注。</div>';
    }
  }
  return '';
}
